name: json_delta
description: >-
  Compute a JSON delta (patch) from an object's initial state to its current
  state. Pairs with json_serializable. Pure Dart — works in Flutter, server,
  and CLI.
version: 0.2.0
homepage: https://oddb.it/website
repository: https://github.com/oddbit/dart-json-delta
issue_tracker: https://github.com/oddbit/dart-json-delta/issues

environment:
  sdk: ">=3.2.3 <4.0.0"

dependencies:
  collection: ^1.19.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.0
